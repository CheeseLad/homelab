services:
  ca298-pizzashop:
    image: ghcr.io/cheeselad/ca298-pizzashop:latest
    container_name: ca298-pizzashop
    restart: unless-stopped
    volumes:
      - ./db.sqlite3:/app/pizzashop/db.sqlite3
    ports:
      - "3021:8000"
    networks:
      - cheeselab

networks:
  cheeselab:
    external: true