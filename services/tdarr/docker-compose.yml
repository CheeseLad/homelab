services:
  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: unless-stopped
    network_mode: bridge
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    environment:
      - TZ=Europe/London
      - PUID=1000
      - PGID=1000
      - UMASK_SET=002
      - serverIP=192.168.1.2
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=CheeseLabInternalNode
      - auth=false
      - openBrowser=true
      - maxLogSizeMB=10
      - cronPluginUpdate=
    volumes:
      - ~/storage/tdarr/server:/app/server
      - ~/storage/tdarr/configs:/app/configs
      - ~/storage/tdarr/logs:/app/logs
      - /media:/media
      - ~/storage/tdarr/transcode_cache:/temp
      - /mnt/storage-hdd/Media/Movies:/movies

    devices:
      - /dev/dri:/dev/dri
    

# node example
  tdarr-node:
    container_name: tdarr-node
    image: ghcr.io/haveagitgat/tdarr_node:latest
    restart: unless-stopped
    network_mode: service:tdarr
    environment:
      - TZ=Europe/London
      - PUID=1000
      - PGID=1000
      - UMASK_SET=002
      - nodeName=CheeseLabExternalNode
      - serverIP=192.168.1.2
      - serverPort=8266
      - inContainer=true
      - ffmpegVersion=7
      - nodeType=mapped
      - priority=-1
      - cronPluginUpdate=
      - apiKey=
      - maxLogSizeMB=10
      - pollInterval=2000
      - startPaused=false
      - transcodegpuWorkers=1
      - transcodecpuWorkers=2
      - healthcheckgpuWorkers=1
      - healthcheckcpuWorkers=1

    volumes:
      - ~/storage/tdarr/configs:/app/configs
      - ~/storage/tdarr/logs:/app/logs
      - /media:/media
      - ~/storage/tdarr/transcode_cache:/temp
      - /mnt/storage-hdd/Media/Movies:/movies

    devices:
      - /dev/dri:/dev/dri